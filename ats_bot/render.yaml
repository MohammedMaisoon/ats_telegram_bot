services:
  # ── Main Bot Service ──────────────────────────────────────
  - type: web
    name: ats-telegram-bot
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "python bot.py"
    plan: free

    envVars:
      - key: BOT_TOKEN
        sync: false                  # Set manually in Render dashboard

      - key: REDIS_URL
        sync: false                  # Set manually in Render dashboard

      - key: ENCRYPT_KEY
        sync: false                  # Set manually in Render dashboard

      - key: MASTER_EMAIL
        sync: false                  # Your SkillSyncer email

      - key: MASTER_PASSWORD
        sync: false                  # Your SkillSyncer password

      - key: RENDER_URL
        sync: false                  # Your Render app URL (for keep-alive ping)

      - key: PORT
        value: "8080"
